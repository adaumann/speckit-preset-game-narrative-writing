schema_version: "1.0"
preset:
  id: "rpg-narrative-writing"
  name: "RPG Narrative Writing"
  version: "1.0.0"
  description: "Spec-Driven Development for interactive RPG narrative. Adapts storytelling craft to branching structures, player agency, quest design, NPC characterization, world-building lore, and dialogue trees. Supports tabletop and computer RPGs across multiple rulesets (D&D 5e, Pathfinder, Shadowrun, etc.). Includes linear, branching, and emergent narrative modes across single- and multi-protagonist games."
  features:
    - "Ruleset-specific templates and mechanics (D&D 5e core, Pathfinder 2e, Shadowrun ready)"
    - "Tabletop vs. Computer game targeting with platform-specific export options"
    - "Genre customization (Fantasy, Sci-Fi, Horror, Cyberpunk, Urban Fantasy, etc.)"
    - "Campaign/Campaign bible structure with theme-driven encounter design"
  author: "Andreas Daumann"
  repository: "https://github.com/adaumann/speckit-preset-rpg-narrative-writing"
  license: "MIT"
requires:
  speckit_version: ">=0.5.0"
provides:
  templates:
    - type: "template"
      name: "constitution-template"
      file: "templates/constitution-template.md"
      description: "Game narrative bible: tone and genre, player character voice contract, world lore rules, narrative mode (linear/branching/emergent), theme, and prose principles for cutscenes, dialogue, and environmental storytelling."
      replaces: "constitution-template"
    - type: "template"
      name: "spec-template"
      file: "templates/spec-template.md"
      description: "Game story brief: logline, premise, player arc, NPC arcs, key relationship arcs, branch structure overview, endings map, key scenes/nodes, design requirements, act boundaries, player experience goals, world rules, and open questions."
      replaces: "spec-template"
    - type: "template"
      name: "plan-template"
      file: "templates/plan-template.md"
      description: "Plan template: node graph in text form, act structure, game bible check gates, information asymmetry map, pacing overview, and node outline scaffold."
      replaces: "plan-template"
    - type: "template"
      name: "implement-template"
      file: "templates/implement-template.md"
      description: "Node draft file: prose body, mechanic hook blocks (MECHANIC:TYPE), choices with branch targets, variables read/set, and status gate (DRAFT/APPROVED/SKIP)."
      replaces: "implement-template"
    - type: "template"
      name: "node-outline-template"
      file: "templates/node-outline-template.md"
      description: "Node outline: beat summary, choice list with branch targets, mechanic hooks triggered, variables read/set. Status gate (DRAFT/APPROVED/SKIP) controls whether speckit.implement drafts this node."
      replaces: "scene-outline-template"
    - type: "template"
      name: "variables-template"
      file: "templates/variables-template.md"
      description: "State variable registry: all declared variables with type, scope, default value, persistence rule, and export name per target. Includes pov variable when player_perspective is switching."
    - type: "template"
      name: "mechanics-template"
      file: "templates/mechanics-template.md"
      description: "Mechanic hook schemas: Tier 1 (flag, counter, visited, inventory, timer, trust, currency, npc_state, ending_condition, choice_memory, clue) with Sugarcube and Ink translations. Tier 2 stubs. Compatibility warning rules."
    - type: "template"
      name: "tasks-template"
      file: "templates/tasks-template.md"
      description: "Node authoring task list: ordered by act and branch, with research phase, node outline phase, drafting phase, quality gate phase, and export phase."
      replaces: "tasks-template"
    - type: "template"
      name: "characters-template"
      file: "templates/characters-template.md"
      description: "NPC profile: trust state thresholds, dialogue register per state, branch behavior map, bark lines, knowledge state, and first/last appearance nodes."
    - type: "template"
      name: "world-building-template"
      file: "templates/world-building-template.md"
      description: "World-building reference: locations with object inventory and state log, world rules (WR-NNN), ambient states, and faction overview."
    - type: "template"
      name: "endings-template"
      file: "templates/endings-template.md"
      description: "Endings registry: ending ID, name, required variable conditions, node paths that reach it, and carry-over state snapshot for series use."
    - type: "template"
      name: "series-bible-template"
      file: "templates/series-bible-template.md"
      description: "Series bible: carry-over variable registry, canonical import state (default save), ending canon table, world state delta per entry, NPC survival registry, and series arc overview."
    - type: "template"
      name: "glossary-template"
      file: "templates/glossary-template.md"
      description: "Game world glossary: invented terms, proper nouns, variable name register, capitalization rules, and consistency log."
    - type: "template"
      name: "feedback-template"
      file: "templates/feedback-template.md"
      description: "Playtest feedback log: issue type (Branch/Variable/Pacing/Clarity/Balance), node ID, severity, and generated revision tasks."
    - type: "template"
      name: "research-template"
      file: "templates/research-template.md"
      description: "Research log: factual and world-building knowledge gaps mapped to nodes, authenticity flags, resolved findings, and open items for task generation."
    - type: "template"
      name: "themes-template"
      file: "templates/themes-template.md"
      description: "Thematic contract: central theme and dramatic question, motif registry (per-node planned occurrences), symbol and object registry, ending thematic divergence, and thematic drift log."
    - type: "template"
      name: "puzzles-template"
      file: "templates/puzzles-template.md"
      description: "P&C Puzzle registry: logical and physical dependency tracking, inventory combinations, and verb-mode interaction mapping (Examine/Interact)."
    - type: "template"
      name: "escoria-script-template"
      file: "templates/escoria-script-template.md"
      description: "Escoria Room Script template: Godot-optimized .esc script structure with support for setup blocks, verb-specific interactions, and marker-based navigation."
    - type: "template"
      name: "relationships-template"
      file: "templates/relationships-template.md"
      description: "NPC relationship arcs: REL-NNN tracked dynamics between key NPCs, repeating loop, five key beats with node references, variable impact table, and drift log."
    - type: "template"
      name: "timeline-template"
      file: "templates/timeline-template.md"
      description: "In-world chronology: fabula (event order), syuzhet (player discovery order across branches), branching timeline consequences, continuity constraints, and timer event schedule. Optional — use for mystery, historical, or timer-heavy games."
    - type: "template"
      name: "checklist-template"
      file: "templates/checklist-template.md"
      description: "Node quality checklist: choice meaningfulness test, hook declaration check, dead-end check, variable read-before-set check, POV drift check, and constitution compliance."
      replaces: "checklist-template"
    - type: "template"
      name: "agent-file-template"
      file: "templates/agent-file-template.md"
      description: "Living context file: active node ID, open branch targets, current variable state snapshot, recent NPC state changes, and open threads."
      replaces: "agent-file-template"
    - type: "template"
      name: "craft-rules-template"
      file: "templates/craft-rules-template.md"
      description: "Craft rules and writing style guide: prose principles, dialogue conventions, prose register per narrative mode, prose quality metrics, and prose consistency checks."
    - type: "template"
      name: "flowmap-template"
      file: "templates/flowmap-template.md"
      description: "Node graph flowmap: Mermaid diagram scaffold for visualizing node structure, branches, mechanic triggers, and endings."
    - type: "template"
      name: "narrative-design-doc-template"
      file: "templates/narrative-design-doc-template.md"
      description: "Narrative design document: free-form story pitch, premise, player arc, NPC arcs, branch skeleton, and design intent before structuring into spec."
    - type: "template"
      name: "node-start-twee-template"
      file: "templates/node-start-twee-template.twee"
      description: "SugarCube starter node in Twee format: minimal passage setup, variable initialization, and hook scaffolding for test compilation."
    - type: "template"
      name: "sugarcube-equipment-ui-template"
      file: "templates/sugarcube-equipment-ui-template.twee"
      description: "SugarCube 2.x equipment UI in Twee format: StoryInit (variable bootstrap), EquipWidgets (<<pickupItem>>, <<dropItem>>, <<equipWeapon>>, <<equipArmor>>, <<equipShield>>, <<equipOffHand>>, <<unequipSlot>>, <<equipAccessory>>, <<unequipAccessory>>, <<consumeItem>>, <<consumeScroll>>, <<useWand>>, <<castSpell>>, <<recoverSpellSlots>> widget macros), StoryCaption (persistent sidebar with equipped gear, accessories, spell slots, inventory count), InventoryUI (full-screen equipment management with in-place equip/unequip/use/cast links). Companion to sugarcube-theme-*.css."
    - type: "template"
      name: "sugarcube-quest-journal-template"
      file: "templates/sugarcube-quest-journal-template.twee"
      description: "SugarCube 2.x quest journal UI in Twee format: StoryInit quest block (state variables + $quest_registry array sourced from quests-template.md), QuestWidgets (<<questAccept>>, <<questAdvance>>, <<questComplete>>, <<questFail>>, <<questIs>> macros), QuestJournal (tabbed full-screen journal: Active / Completed / Failed), QuestJournalBody (inner re-render target for tab switching via <<replace>>), StoryCaption stub (active quest tracker with current stage objective). CSS block included. Companion to sugarcube-equipment-ui-template.twee."
    - type: "template"
      name: "sugarcube-character-sheet-template"
      file: "templates/sugarcube-character-sheet-template.twee"
      description: "SugarCube 2.x character sheet UI in Twee format: StoryInit char block (all variables required by sugarcube-d5e-combat.js — partyLevel, partyCurrentHP, partyMaxHP, playerStr/Dex/Con/Int/Wis/ChaMod, playerProfBonus, partyAC, partyWeaponDmg, saving throw and skill proficiency flags), CharWidgets (<<hpChange>>, <<xpGain>>, <<levelUp>>, <<setAbility>>, <<shortRest>>, <<longRest>>), CharacterSheet (full-screen sheet: HP/combat stats, ability scores with saves, skill table, XP bar, conditions), StoryCaption stub (HP bar + XP bar + level display). Full D&D 5e XP threshold table and proficiency bonus formula included. CSS block included."
    - type: "template"
      name: "sugarcube-faction-reputation-template"
      file: "templates/sugarcube-faction-reputation-template.twee"
      description: "SugarCube 2.x faction and reputation UI in Twee format: JavaScript helpers (_factionTierFromScore, _factionTierIndex, _factionEntry), StoryInit faction block ($faction_registry descriptor array + per-faction rep/tier variables + tier-change notification queue), FactionWidgets (<<factionRep>> clamped delta with tier recalc, <<factionRepSet>> force-set, <<factionTierName>> inline prose label), FactionUI (full-screen screen: reputation bar centred on 0, tier threshold markers, tier colour-coded cards, hidden faction count), StoryCaption stub (per-faction tier badge list + turn-based tier-change notifications). Six tiers: hostile/unfriendly/neutral/friendly/allied/exalted. Per-faction threshold overrides supported. CSS block included."
    - type: "template"
      name: "sugarcube-theme-dark"
      file: "templates/sugarcube-theme-dark.css"
      description: "Sugarcube 2.x dark CSS theme: deep charcoal background, muted purple accent, serif prose column, sidebar UI. All values exposed as CSS custom properties in :root for easy adjustment."
    - type: "template"
      name: "sugarcube-theme-light"
      file: "templates/sugarcube-theme-light.css"
      description: "Sugarcube 2.x light CSS theme: warm off-white background, ink-blue links, golden accent, serif prose column with sidebar. All values exposed as CSS custom properties in :root."
    - type: "template"
      name: "sugarcube-theme-minimal"
      file: "templates/sugarcube-theme-minimal.css"
      description: "Sugarcube 2.x minimal CSS theme: white page, hidden sidebar, centred prose column, near-invisible UI. Ideal for literary IF where the interface should disappear. CSS custom properties in :root."
    - type: "template"
      name: "ink-theme-dark"
      file: "templates/ink-theme-dark.html"
      description: "Ink dark HTML theme: deep charcoal background, muted purple accent, serif prose, dramatic styling. Wraps story.json in themed HTML wrapper for display."
    - type: "template"
      name: "ink-theme-light"
      file: "templates/ink-theme-light.html"
      description: "Ink light HTML theme: warm off-white background, blue links, serif prose column with sidebar aesthetic. Wraps story.json in clean, readable HTML wrapper."
    - type: "template"
      name: "ink-theme-minimal"
      file: "templates/ink-theme-minimal.html"
      description: "Ink minimal HTML theme: white page, near-invisible UI, pure prose focus. Ideal for literary IF where the interface should disappear. Wraps story.json minimally."
    - type: "command"
      name: "speckit.specify"
      file: "commands/speckit.specify.md"
      description: "Create a narrative design document from a game idea: premise, player arc, central dramatic question, branch structure overview, endings count."
    - type: "command"
      name: "speckit.clarify"
      file: "commands/speckit.clarify.md"
      description: "Detect and resolve narrative ambiguity: branching logic gaps, undeclared variables, unreachable endings, NPC state contradictions."
    - type: "command"
      name: "speckit.constitution"
      file: "commands/speckit.constitution.md"
      description: "Generate the constitution (constitution.md) from an approved narrative design doc. Configures engine target, mechanics, POV, craft rules, and content policy."
    - type: "command"
      name: "speckit.plan"
      file: "commands/speckit.plan.md"
      description: "Generate the project plan (plan.md) from an approved story brief: node graph, act structure, branch health check, information asymmetry map. Also generates all supporting documents — variables.md, mechanics.md, endings.md, character profiles, world-building.md, glossary.md, themes.md, and conditional documents (relationships.md, timeline.md, series-bible.md)."
    - type: "command"
      name: "speckit.outline"
      file: "commands/speckit.outline.md"
      description: "Generate editable node outline files: beat summary, choice list with branch targets, mechanic hooks, variables read/set. Status gate controls drafting in speckit.implement."
    - type: "command"
      name: "speckit.tasks"
      file: "commands/speckit.tasks.md"
      description: "Generate node authoring tasks ordered by act and branch: research phase, outline phase, drafting phase, quality gate phase, export phase."
    - type: "command"
      name: "speckit.implement"
      file: "commands/speckit.implement.md"
      description: "Draft node prose from approved node outlines, inserting mechanic hook blocks. Gates on APPROVED outline status. Enforces hook declaration against variables-template."
    - type: "command"
      name: "speckit.analyze"
      file: "commands/speckit.analyze.md"
      description: "Pre-draft structural check: branch coverage, dead ends, unreachable nodes, undeclared variables, endings reachability. Run before speckit.implement."
    - type: "command"
      name: "speckit.status"
      file: "commands/speckit.status.md"
      description: "Project dashboard: node count by status, branch coverage %, variable completeness, endings reachable vs. declared, outstanding quality gates."
    - type: "command"
      name: "speckit.checklist"
      file: "commands/speckit.checklist.md"
      description: "Node quality gates: choice meaningfulness test, hook declaration check, dead-end check, variable read-before-set check, POV drift check."
    - type: "command"
      name: "speckit.verify"
      file: "commands/speckit.verify.md"
      description: "Optional: Run full unit test suite on drafted nodes (structural tests, hook validation, self-correction loop). speckit.compile includes basic validation automatically; use this for comprehensive testing beyond what compile checks."
    - type: "command"
      name: "speckit.compile"
      file: "commands/speckit.compile.md"
      description: "Compile all drafted node files from engine-specific format to playable output (HTML for Twine/SugarCube, .ink for Ink, etc.) in spec/<specname>/output/<engine>/. Includes built-in structural validation (YAML parsing, hook syntax). Supports iterative error fixing. Use instead of speckit.verify for standard workflows."
    - type: "command"
      name: "speckit.revise"
      file: "commands/speckit.revise.md"
      description: "Targeted node revision: rewrites only failing passages or broken hook blocks identified by speckit.checklist or speckit.continuity. Produces a versioned node file."
    - type: "command"
      name: "speckit.polish"
      file: "commands/speckit.polish.md"
      description: "Final line-edit pass: prose rhythm, sentence variety, word repetition, filter words, adverb density, and voice register consistency. Runs after speckit.checklist PASS."
    - type: "command"
      name: "speckit.continuity"
      file: "commands/speckit.continuity.md"
      description: "Post-draft audit: variable state consistency across all branches, branch reachability, POV drift, series bible carry-over variable validation."
    - type: "command"
      name: "speckit.flowmap"
      file: "commands/speckit.flowmap.md"
      description: "Visualize the full branch graph as a Mermaid flowchart with mechanic trigger annotations, ending markers, and act boundary labels."
    - type: "command"
      name: "speckit.mechanics"
      file: "commands/speckit.mechanics.md"
      description: "Manage mechanic hook schemas: declare new Tier 2 stubs, promote stubs to Tier 1 with translation tables, audit hook usage across node files vs. mechanics.md declarations."
    - type: "command"
      name: "speckit.brainstorm"
      file: "commands/speckit.brainstorm.md"
      description: "Interactive brainstorming session for any game narrative topic: story, characters, mechanics, endings, world, variables, series, or glossary."
    - type: "command"
      name: "speckit.research"
      file: "commands/speckit.research.md"
      description: "Research tracking: log knowledge gaps (add), record findings (resolve), scan drafted nodes for unsupported claims (check), view open items ranked by risk (status)."
    - type: "command"
      name: "speckit.feedback"
      file: "commands/speckit.feedback.md"
      description: "Ingest playtest notes, categorize by issue type (Branch/Variable/Pacing/Clarity/Balance), map to node IDs, assign severity, generate prioritized revision tasks."
    - type: "command"
      name: "speckit.series"
      file: "commands/speckit.series.md"
      description: "Manage series bible: validate carry-over variables are declared before use, check ending canon consistency across entries, generate import questionnaire scaffold."
    - type: "command"
      name: "speckit.help"
      file: "commands/speckit.help.md"
      description: "Command reference: all commands with sub-commands, workflow stage, and recommended next step."
    - type: "command"
      name: "speckit.theme"
      file: "commands/speckit.theme.md"
      description: "Generate or adjust story.css: copies a base Sugarcube CSS theme (dark/light/minimal) and applies colour, font, background, and layout overrides. Supports both flag-based and natural language input."
    - type: "command"
      name: "speckit.agency"
      file: "commands/speckit.agency.md"
      description: "Player agency validator: verify choices have consequences and aren't illusory. Detects forced branches, dead choices, and cosmetic-only decisions via variable state tracking."
    - type: "command"
      name: "speckit.endings"
      file: "commands/speckit.endings.md"
      description: "Ending quality gate: verify all endings resolve the central dramatic question, maintain thematic consistency, and provide satisfying closure with character arc completion and stakeholder fates."
    - type: "command"
      name: "speckit.subplots"
      file: "commands/speckit.subplots.md"
      description: "Subplot resolution tracker: verify subplots are started, developed, and resolved (not abandoned) across all branches. Detects dangling threads and inconsistent handling."
    - type: "command"
      name: "speckit.tone"
      file: "commands/speckit.tone.md"
      description: "Emotional beat mapper: validate tone trajectory is consistent and earned. Detects tonal whiplash, emotionally hollow moments, manipulative tone, and ensures alignment with central theme."
    - type: "command"
      name: "speckit.foreshadow"
      file: "commands/speckit.foreshadow.md"
      description: "Foreshadowing & payoff tracker: verify clues are placed before revelations, ensure mysteries feel fair (not random/cheap), detect orphaned foreshadowing and premature payoffs."
    - type: "command"
      name: "speckit.pacing"
      file: "commands/speckit.pacing.md"
      description: "Pacing analyzer: measure word count, beat spacing, reading time per branch. Detects info dumps, draggy sections, rushed climax, dead zones, inconsistent node sizes."
    - type: "command"
      name: "speckit.asymmetry"
      file: "commands/speckit.asymmetry.md"
      description: "Information gap mapper: visualize what player knows vs NPCs know. Detects blind spots, unrealistic NPC knowledge, ensures player agency via informed decisions."
    - type: "command"
      name: "speckit.statemap"
      file: "commands/speckit.statemap.md"
      description: "State mapper: visualize game state transitions across branches. Detects unreachable states, dead-end variable combos, branch convergence conflicts, untracked mutations."
    - type: "command"
      name: "speckit.complexity"
      file: "commands/speckit.complexity.md"
      description: "Complexity analyzer: detect exponential branch growth, warn on unsustainable branching patterns, estimate maintenance effort per branch depth."
    - type: "command"
      name: "speckit.replayability"
      file: "commands/speckit.replayability.md"
      description: "Replayability metrics: measure unique content per playthrough, branch coverage, dialogue variation, content reuse. Identifies hidden content and opportunities for fresh playthroughs."
    - type: "command"
      name: "speckit.consequences"
      file: "commands/speckit.consequences.md"
      description: "Choice consequence mapper: visualize how each choice branches into different outcomes. Track consequences, detect orphaned branches, map consequence chains."
    - type: "command"
      name: "speckit.accessibility"
      file: "commands/speckit.accessibility.md"
      description: "Accessibility validator: measure readability (grade level, sentence length), flag content warnings, validate UI contrast, identify ableist language."
    - type: "command"
      name: "speckit.secrets"
      file: "commands/speckit.secrets.md"
      description: "Secret content tracker: map achievements, hidden content, easter eggs. Verify all secrets are discoverable, reachable, and properly documented."
    - type: "script"
      name: "sugarcube-d5e-combat"
      file: "scripts/sugarcube-d5e-combat.js"
      description: "SugarCube D&D 5e combat engine: full in-browser combat loop with initiative, attack rolls, critical hits, damage expressions (NdX+Y), multiattack, saving throws, on-hit effects, enemy features (Second Wind etc.), morale checks, XP/loot award, and level-up detection. Exposes <<combat>>, <<skillcheck>>, <<combatlog>>, and <<retreat>> macros. Paste into a [script] Twee passage."
      language: "javascript"
      requires: ["sugarcube-2"]
    - type: "script"
      name: "map-export"
      file: "scripts/python/map-export.py"
      description: "Map export script: Converts map data to engine-specific formats (Foundry VTT JSON, hex grid, asset layers). Handles RPG-specific map structures with encounter and token overlays."
      language: "python"
      requires: []
    - type: "script"
      name: "validate-companion-timelines"
      file: "scripts/python/validate_companion_timelines.py"
      description: "Companion timeline validator: verifies companion recruitment, approval, and departure events are consistent across all branches and sessions."
      language: "python"
      requires: []
    - type: "script"
      name: "validate-ending-gates"
      file: "scripts/python/validate_ending_gates.py"
      description: "Ending gate validator: checks that all ending conditions reference declared variables and that every ending is reachable via at least one valid variable state combination."
      language: "python"
      requires: []
    - type: "script"
      name: "validate-reputation-arcs"
      file: "scripts/python/validate_reputation_arcs.py"
      description: "Reputation arc validator: confirms faction reputation changes are applied consistently and that reputation-gated endings are reachable within the campaign's event sequence."
      language: "python"
      requires: []
    - type: "script"
      name: "validate-skill-distribution"
      file: "scripts/python/validate_skill_distribution.py"
      description: "Skill distribution validator: audits skill check DCs and ability types across all nodes to ensure balanced skill usage and appropriate challenge scaling per campaign level range."
      language: "python"
      requires: []
tags: ["writing", "game", "narrative", "interactive-fiction", "quest-design", "dialogue", "game-dev", "rpg", "storytelling", "spec-driven-development"]
