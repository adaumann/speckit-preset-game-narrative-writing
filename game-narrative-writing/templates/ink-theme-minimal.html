<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{title}</title>
    <style>
        * {{
            box-sizing: border-box;
        }}

        html, body {{
            margin: 0;
            padding: 0;
            font-family: Georgia, serif;
            font-size: 18px;
            line-height: 1.8;
            color: #333;
            background: #fff;
        }}

        #story {{
            max-width: 680px;
            margin: 0 auto;
            padding: 40px 20px;
        }}

        h1 {{
            font-size: 1.8em;
            margin: 1em 0 0.5em 0;
            padding: 0;
            border: none;
            color: #000;
        }}

        p {{
            margin: 0 0 1em 0;
        }}

        a {{
            color: #0066cc;
            text-decoration: underline;
        }}

        a:visited {{
            color: #663399;
        }}

        #content {{
            min-height: 200px;
        }}

        .passage {{
            margin-bottom: 2em;
        }}

        .choices {{
            margin-top: 2em;
        }}

        .choice {{
            display: block;
            margin: 8px 0;
            padding: 8px;
            border: none;
            background: transparent;
            color: #0066cc;
            font-family: Georgia, serif;
            font-size: 1em;
            cursor: pointer;
            text-decoration: underline;
            text-align: left;
        }}

        .choice:hover {{
            color: #003d99;
        }}

        ul {{
            margin: 0.5em 0;
            padding-left: 1.5em;
        }}

        li {{
            margin: 0.3em 0;
        }}

        pre {{
            display: none;
        }}

        .meta {{
            display: none;
        }}
    </style>
</head>
<body>
    <div id="story">
        <h1>{title}</h1>
        <div id="content">
            <p>Loading story...</p>
        </div>
    </div>
    <script>
        const storyData = {story_json};
        
        document.getElementById('content').innerHTML = `
            <div class="passage">
                <p>Story compiled with Ink.</p>
                <p>Use an Ink runtime player: <a href="https://github.com/inkle/ink-web" target="_blank">Ink Web Player</a></p>
            </div>
        `;
    </script>
</body>
</html>
